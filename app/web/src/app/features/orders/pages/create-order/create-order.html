<div class="max-w-md mx-auto p-4 space-y-4" [formGroup]="form">
  <input
    class="w-full border p-2"
    placeholder="Produto"
    formControlName="product"
    [formGroup]="form"
  />
  <input class="w-full border p-2" type="number" formControlName="quantity" [formGroup]="form" />
  <button class="bg-blue-600 text-white px-4 py-2" (click)="submit()">Criar pedido</button>
</div>
